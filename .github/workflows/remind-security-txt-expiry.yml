name: Remind about security.txt expiry

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  remind-security-txt-expiry:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    permissions:
      issues: write

    steps:
      - name: Check security.txt expiry window
        uses: actions/github-script@v7
        env:
          REPO: ${{ github.repository }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueTitle = "security.txt expiry reminder";
            const expiresAt = new Date("2027-04-08T00:00:00Z");
            const now = new Date();
            const daysUntilExpiry = Math.ceil((expiresAt - now) / (1000 * 60 * 60 * 24));
            const reminderWindowDays = 45;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === issueTitle);

            if (daysUntilExpiry > reminderWindowDays) {
              core.info(`security.txt expires in ${daysUntilExpiry} days; no reminder needed.`);
              if (existing) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body: `The reminder condition no longer applies. \`security.txt\` currently expires on 2027-04-08T00:00:00Z, which is ${daysUntilExpiry} days away.`,
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: existing.number,
                  state: "closed",
                });
              }
              return;
            }

            const body = [
              "`security.txt` is nearing expiry.",
              "",
              `Configured expiry: \`2027-04-08T00:00:00Z\``,
              `Days remaining: \`${daysUntilExpiry}\``,
              "",
              "Update these files before the expiry date:",
              "- `/.well-known/security.txt`",
              "- `/security.txt`",
              "",
              "If the reporting URL changes, update `README.md` too."
            ].join("\n");

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              core.info("Updated existing security.txt reminder issue.");
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title: issueTitle,
              body,
            });
