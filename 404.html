<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BSides - Not found :/</title>
    <style>
      body,
      body * {
        margin: 0;
        padding: 0;
      }

      body {
        background-image: url(/hackers-love.jpg);
        background-size: 20vw auto;
      }

      #hackers {
        width: 80vw;
        height: 80vh;
        position: absolute;
        top: 10vh;
        left: 10vw;
        background-image: url(/hackers-love.jpg);
        background-size: cover;
        background-position: center;
      }

      h1 {
        width: 100%;
        position: absolute;
        bottom: 0;
        text-align: center;
        font-size: 77px;
        font-family: monospace;
        -webkit-text-stroke: 2px white;
      }
    </style>
    <script>
      let str = document.title;
      let i = 0;
      const len = 42 + 1;
      let x;
      let d;
      const pool = [4, 0];

      const fn = (cb) => {
        x = i++ % len;
        if (!x) {
          d = !d;
        }
        str = d ? str + pool[x % pool.length] : str.substr(0, str.length - 1);
        setTimeout(() => cb(str) + fn(cb), 420);
      };

      fn((value) => {
        document.title = value;
      });

      function blingify() {
        let j = 0;
        setInterval(() => {
          document.body.style.backgroundPosition = `${j}px ${j}px`;
          j++;
        }, 42);
      }
    </script>
  </head>
  <body onload="blingify()">
    <section id="hackers">
      <h1>404</h1>
    </section>
  </body>
</html>
